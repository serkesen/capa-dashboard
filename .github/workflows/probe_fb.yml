name: probe-fb
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -q requests
      - run: python probe_fb.py
        env:
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_PAGE_ID: '233229654211'
